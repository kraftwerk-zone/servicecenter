site_name: KraftwerK Dokumentation
site_url: https://kraftwerk.shop/docs/
site_description: Technische Dokumentation für Produkte, Module und Systeme

docs_dir: docs/de

theme:
  name: material
  language: de
  palette:
    scheme: default
    primary: orange
    accent: orange
  features:
    - navigation.tabs          # Baut deine Hauptordner als Tabs oben auf
    - navigation.footer         # Baut die Sidebar NUR für den aktuell aktiven Tab auf (Dein Silo-Effekt!)
#    - navigation.sections      # Macht Untermenüs in der Sidebar aufklappbar
#    - navigation.expand        # Klappt die Menüs in der Sidebar standardmäßig aus
#    - navigation.prune         # Baut die Sidebar NUR für den aktuell aktiven Tab auf (Dein Silo-Effekt!)
#    - toc.integrate            # Integriert das Inhaltsverzeichnis der Seite in die linke Navigation
    - content.code.copy
    - content.action.edit
    
    
#nav:
#  - Handbücher:
#      - K101D: de/manuals/K101D Handbuch EasyBus Lichtanlagen/
#      - RS1: de/manuals/rs1/index.md
#  - FAQ:
#      - FAQ2: de/faq/faq.md
#      - RS1: de/faq/rs1.md
#      - ControlPanel: de/faq/controlpanel.md
#  - Troubleshooting:
#      - Allgemein: de/troubleshooting/allgemein.md
#      - Module: de/troubleshooting/module.md
#  - ControlPanel Download:
#      - EasyBus: de/controlpanel_downloads.md

markdown_extensions:
  - admonition
  - toc:
      permalink: true
  - tables
  - footnotes
  - def_list
  - attr_list
  - md_in_html
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - pymdownx.snippets
  - pymdownx.tabbed

plugins:
  - search
  - awesome-pages
  - macros
  - minify:
      minify_html: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/kraftwerk-zone
